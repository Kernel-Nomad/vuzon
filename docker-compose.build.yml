# Desarrollo: construir la imagen desde el repositorio en lugar de GHCR.
#
# Fusionar con el compose base (puerto, volumen ./sessions, .env, healthcheck del Dockerfile):
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up --build -d
#
# Forzar reconstrucción completa (p. ej. tras cambiar dependencias en package-lock):
#   docker compose -f docker-compose.yml -f docker-compose.build.yml build --no-cache
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d
services:
  vuzon:
    build:
      context: .
      dockerfile: Dockerfile
    # Nombre local de la imagen construida (no hay pull útil desde un registro público).
    image: vuzon-local
